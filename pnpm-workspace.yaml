packages:
  - .

onlyBuiltDependencies:
  - '@reown/appkit'
  - '@tailwindcss/oxide'
  - esbuild
  - sharp
  - simple-git-hooks
  - unrs-resolver

overrides:
  '@isaacs/brace-expansion@<=5.0.0': '>=5.0.1'
  '@metamask/sdk-communication-layer@>=0.16.0 <=0.33.0': '>=0.33.1'
  '@metamask/sdk@>=0.16.0 <=0.33.0': '>=0.33.1'
  axios@>=1.0.0 <1.15.2: '>=1.15.2'
  bn.js@<4.12.3: '>=4.12.3'
  brace-expansion@<1.1.13: '>=1.1.13'
  flatted@<=3.4.1: '>=3.4.2'
  follow-redirects@<=1.15.11: '>=1.16.0'
  hono@<4.12.16: '>=4.12.16'
  js-yaml@<4.1.1: '>=4.1.1'
  lodash-es@<=4.17.23: '>=4.18.0'
  lodash@<=4.17.23: '>=4.18.0'
  minimatch@>=10.0.0 <10.2.3: '>=10.2.3'
  next@>=16.0.0-beta.0 <16.2.3: '>=16.2.3'
  picomatch@<2.3.2: '>=2.3.2'
  picomatch@>=4.0.0 <4.0.4: '>=4.0.4'
  postcss@<8.5.10: '>=8.5.10'
  qs@>=6.7.0 <=6.14.1: '>=6.14.2'
  rollup@>=4.0.0 <4.59.0: '>=4.59.0'
  serialize-javascript@<7.0.5: '>=7.0.5'
  socket.io-parser@>=4.0.0 <4.2.6: '>=4.2.6'
  storybook@>=10.0.0-beta.0 <10.2.10: '>=10.2.10'
  vite@>=7.1.0 <=7.1.10: '>=7.1.11'
  vite@>=8.0.0 <=8.0.4: '>=8.0.5'
  yaml@>=2.0.0 <2.8.3: '>=2.8.3'

peerDependencyRules:
  # Storybook 9.alpha addons work with Storybook 10 (no v10 addons released yet)
  allowedVersions:
    '@storybook/addon-essentials>storybook': '10'
    '@storybook/addon-interactions>storybook': '10'
    '@storybook/addon-backgrounds>storybook': '10'
    '@storybook/addon-highlight>storybook': '10'
    '@storybook/addon-measure>storybook': '10'
    '@storybook/addon-outline>storybook': '10'
    '@storybook/blocks>storybook': '10'
    '@storybook/test>storybook': '10'
  # Ecosystem catching up to latest major versions - these work in practice
  allowAny:
    - typescript
    - zod
    - react

shamefullyHoist: true
