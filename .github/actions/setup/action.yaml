---
name: Setup Project
description: Setup Node.js, pnpm, and install dependencies

inputs:
  node-version:
    description: Node.js version to setup
    required: false
    default: '22'
  install-dependencies:
    description: Whether to install dependencies
    required: false
    default: 'true'
  cache-key-suffix:
    description: Additional suffix for cache keys
    required: false
    default: ''

outputs:
  node-version:
    description: The Node.js version that was setup
    value: ${{ steps.setup-node.outputs.node-version }}
  cache-hit:
    description: Whether pnpm cache was hit
    value: ${{ steps.setup-node.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Setup pnpm
      id: setup-pnpm
      uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
      with:
        run_install: false

    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: pnpm install --prefer-offline --loglevel warn

    - name: Verify installation
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: |
        echo "Node.js version: $(node --version)"
        echo "pnpm version: $(pnpm --version)"
        echo "Dependencies installed successfully"

    - id: cache-nextjs
      name: Setup Next.js related caches
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        key: ${{ runner.os }}-nextjs-cache${{ inputs.cache-key-suffix && '-' }}${{ inputs.cache-key-suffix }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-cache${{ inputs.cache-key-suffix && '-' }}${{ inputs.cache-key-suffix }}-
        path: |
          .next/cache
          .cache
          **/tsconfig.tsbuildinfo
