---
name: CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  SKIP_ENV_VALIDATION: 'true'

jobs:
  # Quality Assurance Jobs
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: TypeScript Type Check
        run: pnpm exec tsc --noEmit

      - name: Run ESLint
        run: pnpm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: Run Tests
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm test
          else
            pnpm test:coverage
          fi

      - name: Upload Coverage Reports
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-coverage
          path: coverage/
          retention-days: 7

  # Build Jobs
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: Record Build Start Time
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build Application
        run: pnpm run build

      - name: Report Build Duration
        if: always()
        run: echo "Build completed in $(($(date +%s) - $START_TIME)) seconds"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: build-artifacts
          path: |
            .next/
            !.next/cache/
          retention-days: 7

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Upload Storybook Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook-build
          path: storybook-static/
          retention-days: 7

  # Security and Quality Checks
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate

  # Deployment Jobs
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, build-storybook, security-audit]
    if: github.event_name == 'pull_request'
    environment:
      name: staging
      url: https://tokentoilet-staging.vercel.app
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts
          path: .next/

      - name: Deploy to Vercel (Staging)
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "This would deploy to Vercel staging with preview URL"
          echo "Preview URL would be available for PR review"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, build-storybook]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://tokentoilet.vercel.app
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts
          path: .next/

      - name: Deploy to Vercel (Production)
        run: |
          echo "🚀 Deploying to production environment..."
          echo "This would deploy to Vercel production"
          echo "Production deployment completed"

  # Notification Job
  notify-completion:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: CI/CD Pipeline Completed
        run: |
          echo "✅ CI/CD Pipeline completed successfully"
          echo "All quality gates passed and deployment completed"
