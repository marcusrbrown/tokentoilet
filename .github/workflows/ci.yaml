---
name: CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  SKIP_ENV_VALIDATION: 'true'

jobs:
  # Quality Assurance Jobs
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: TypeScript Type Check
        run: pnpm exec tsc --noEmit

      - name: Run ESLint
        run: pnpm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: Run Tests
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm test
          else
            pnpm test:coverage
          fi

      - name: Upload Coverage Reports
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-coverage
          path: coverage/
          retention-days: 7

  # Build Jobs
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: Record Build Start Time
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build Application
        run: pnpm run build

      - name: Report Build Duration
        if: always()
        run: echo "Build completed in $(($(date +%s) - $START_TIME)) seconds"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          include-hidden-files: true
          name: build-artifacts
          path: |
            .next/
            !.next/cache/
          retention-days: 7

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Upload Storybook Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook-build
          path: storybook-static/
          retention-days: 7

  # Security and Quality Checks
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: ⤵️ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate

  # Note: Deployment is handled automatically by Vercel GitHub integration
  # - PRs get preview deployments at unique URLs
  # - Pushes to main trigger production deployment to tokentoilet.com
